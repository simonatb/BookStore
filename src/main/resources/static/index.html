<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="index.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookStore</title>
</head>
<body>

<nav>
    <h1>BookStore</h1>
    <div id="nav-actions">
        <a href="/login.html">Login</a>
        <a href="/register.html">Register</a>
    </div>
</nav>

<div class="hero">
    <h2>Welcome to BookStore</h2>
    <p>Find your next favourite book.</p>
    <a href="/books.html">Browse All Books</a>
</div>

<div class="books">
    <h3>Featured Books</h3>
    <div class="books-grid" id="books-grid">
        <p>Loading...</p>
    </div>
</div>

<!--<footer>-->
<!--    <p>© 2026 BookStore</p>-->
<!--</footer>-->

<script>
    // update nav if logged in
    const token = localStorage.getItem('token');
    if (token) {
        document.getElementById('nav-actions').innerHTML = `
            <a href="/books.html">Browse</a>
            <a href="#" onclick="logout()">Logout</a>
        `;
    }

    function logout() {
        localStorage.removeItem('token');
        window.location.reload();
    }

    // load first 4 books as featured
    fetch('http://localhost:8080/api/books')
        .then(res => res.json())
        .then(books => {
            const grid = document.getElementById('books-grid');

            if (books.length === 0) {
                grid.innerHTML = '<p>No books available yet.</p>';
                return;
            }

            // show only first 4 as featured
            grid.innerHTML = books.slice(0, 4).map(book => `
                <div class="book-card">
                    <div class="cover genre-${book.genre}">
                        ${book.imageUrl
                            ? `<img src="${book.imageUrl}" alt="${book.title}" style="width:100%;height:100%;object-fit:cover;">`
                            : book.title
                        }
                    </div>
                    <h4>${book.title}</h4>
                    <div class="author">${book.authorName || ''}</div>
                    <p>$${parseFloat(book.price).toFixed(2)}</p>
                </div>
            `).join('');
        })
        .catch(() => {
            document.getElementById('books-grid').innerHTML = '<p>Failed to load books.</p>';
        });
</script>

</body>
</html>
