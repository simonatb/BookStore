<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — BookStore</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; display: flex; flex-direction: column; min-height: 100vh; }
        nav { background: #fff; border-bottom: 1px solid #ddd; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        nav h1 { font-size: 1.5rem; }
        nav h1 a { text-decoration: none; color: #333; }
        nav a { text-decoration: none; color: #333; margin-left: 1rem; padding: 0.5rem 1rem; border: 1px solid #333; border-radius: 4px; }
        nav a:hover { background: #333; color: #fff; }

        .container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }

        .form-box {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
        }

        .form-box h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .form-box p { color: #666; font-size: 0.9rem; margin-bottom: 2rem; }

        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 0.4rem; }

        input {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.95rem;
            outline: none;
        }

        input:focus { border-color: #333; }

        .btn { width: 100%; padding: 0.75rem; background: #333; color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; margin-top: 0.5rem; }
        .btn:hover { background: #555; }

        .form-footer { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: #666; }
        .form-footer a { color: #333; }

        .error { background: #ffeaea; border: 1px solid #f5c6c6; color: #c0392b; padding: 0.75rem; border-radius: 4px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
        .success { background: #eaffea; border: 1px solid #a8e6a8; color: #27ae60; padding: 0.75rem; border-radius: 4px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
    </style>
</head>
<body>

<nav>
    <h1><a href="/index.html">BookStore</a></h1>
    <div>
        <a href="/login.html">Login</a>
    </div>
</nav>

<div class="container">
    <div class="form-box">
        <h2>Create Account</h2>
        <p>Register to start browsing our collection.</p>

        <div class="error" id="error-msg"></div>
        <div class="success" id="success-msg"></div>

        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="John Doe">
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn" onclick="register()">Create Account</button>

        <div class="form-footer">
            Already have an account? <a href="/login.html">Sign in</a>
        </div>
    </div>
</div>

<script>
    async function register() {
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');

        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';

        if (!name || !email || !password) {
            errorMsg.textContent = 'Please fill in all fields.';
            errorMsg.style.display = 'block';
            return;
        }

        try {
            const response = await fetch('http://localhost:8080/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });

            const data = await response.text();

            if (!response.ok) {
                errorMsg.textContent = data || 'Registration failed.';
                errorMsg.style.display = 'block';
                return;
            }

            successMsg.textContent = 'Registration successful! Please check your email to verify your account.';
            successMsg.style.display = 'block';

        } catch (err) {
            errorMsg.textContent = 'Something went wrong. Please try again.';
            errorMsg.style.display = 'block';
        }
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') register();
    });
</script>

</body>
</html>
