<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" th:href="@{/style.css}">
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
<nav>
    <div class="nav">
        <a href="/"><h1>BookStore</h1></a>
    </div>
</nav>

<div class="login-container">
    <div class="login-card">
        <h2>Login</h2>
        <div th:if="${param.registered}" class="alert-info" style="color: blue; margin-bottom: 15px;">
            Registration successful! Please check your email to verify your account.
        </div>

        <div th:if="${param.verified}" class="alert-success" style="color: green; margin-bottom: 15px;">
            Email verified! You can now log in.
        </div>

        <div th:if="${param.error}" class="alert-error" style="color: red; margin-bottom: 15px;">
            Invalid email/password or account not yet verified.
        </div>

        <p class="subtitle">Welcome back. Enter your details to continue.</p>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Email</label>
                <input type="email" id="username" name="username" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="nav-btn primary login-submit">Login</button>
        </form>

        <div class="login-footer">
            <span>Don't have an account? <a th:href="@{/register}">Register here</a></span>
        </div>
    </div>
</div>

</body>
</html>
